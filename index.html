<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダメージ計算ツール</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>ダメージ計算ツール</h1>

    <label>計算するダメージ種類
      <select id="damageType">
        <option>物理ダメージ</option>
        <option>属性特技ダメージ</option>
      </select>
    </label>

    <div class="side-columns">
      <section class="side-panel attacker-panel">
        <h2>攻撃する側</h2>
        <label>攻撃力
          <input id="attackPower" type="number" min="1" step="1" />
        </label>
        <label>攻撃力のバフ、デバフ状態
          <select id="attackStage"></select>
        </label>
        <label>攻撃倍率+値（未入力なら等倍）
          <input id="attackMultiplier" type="number" step="0.01" placeholder="デカグロのみの例 : 0.7" />
        </label>
        <label>攻撃側のじゃんけん勝敗
          <select id="jankenResult">
            <option>無し、あいこ</option>
            <option>勝ち</option>
            <option>負け</option>
          </select>
        </label>

        <div class="inline-two">
          <label>攻撃ヒット数
            <select id="hitCount">
              <option value="1" selected>1回</option>
              <option value="2">2回</option>
              <option value="3">3回</option>
            </select>
          </label>
          <label>クリティカル発生回数
            <select id="criticalCount"></select>
          </label>
        </div>
      </section>

      <section class="side-panel defender-panel">
        <h2>攻撃される側</h2>
        <label>防御力
          <input id="defensePower" type="number" min="1" step="1" />
        </label>
        <label>防御力のバフ、デバフ状態
          <select id="defenseStage"></select>
        </label>
        <label>オート防御、守り
          <select id="autoGuard">
            <option>発動しない</option>
            <option>発動する</option>
          </select>
        </label>
      </section>
    </div>

    <section id="output"></section>
  </main>

  <script src="calculator.js"></script>
  <script src="app.js"></script>
</body>
</html>
